<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NaviGo AI | Explore CAMANAVA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* NaviGo 2.0 Color Palette */
            --primary: #003366;
            --primary-gradient: linear-gradient(135deg, #003366 0%, #0055aa 100%);
            --accent: #00d2ff;
            --bg-glass: rgba(255, 255, 255, 0.9);
            --bg-scaffold: #f0f2f5;
            --text-main: #1c1e21;
            --text-muted: #65676b;
            --bot-bubble: #f0f2f5;
            --user-bubble: #003366;
            --glass-border: rgba(255, 255, 255, 0.5);
        }

        body.dark-mode {
            --bg-scaffold: #0b141d;
            --bg-glass: rgba(21, 32, 43, 0.95);
            --text-main: #e4e6eb;
            --text-muted: #b0b3b8;
            --bot-bubble: #243447;
            --user-bubble: #1d9bf0;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-scaffold);
            background-image: radial-gradient(circle at 10% 20%, rgba(0, 51, 102, 0.05) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(0, 210, 255, 0.05) 0%, transparent 40%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            margin: 0;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        .chat-shell {
            width: 480px;
            height: 90dvh;
            max-height: 850px;
            background: var(--bg-glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            flex-direction: column;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            border: 1px solid var(--glass-border);
            position: relative;
        }

        @media (max-width: 600px) {
            .chat-shell {
                width: 100%;
                height: 100dvh;
                max-height: 100dvh;
                border-radius: 0;
            }
        }

        header {
            padding: 20px 24px;
            background: var(--primary-gradient);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 28px 28px 0 0;
            flex-shrink: 0;
        }

        @media (max-width: 600px) { header { border-radius: 0; padding-top: calc(15px + env(safe-area-inset-top)); } }

        .logo-area h1 {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            font-size: 1.25rem;
            letter-spacing: -0.5px;
        }

        .logo-area span { font-size: 0.75rem; opacity: 0.8; font-weight: 400; }

        .theme-btn {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .theme-btn:hover { background: rgba(255, 255, 255, 0.25); transform: translateY(-2px); }

        #chat {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        /* Modern Bubble Design */
        .msg {
            max-width: 82%;
            padding: 14px 18px;
            font-size: 0.93rem;
            line-height: 1.6;
            animation: slideUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .bot-msg {
            align-self: flex-start;
            background: var(--bot-bubble);
            color: var(--text-main);
            border-radius: 20px 20px 20px 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .user-msg {
            align-self: flex-end;
            background: var(--user-bubble);
            color: white;
            border-radius: 20px 20px 4px 20px;
            box-shadow: 0 4px 12px rgba(0, 51, 102, 0.2);
            font-weight: 500;
        }

        /* Structured Elements */
        .response-container { display: flex; flex-direction: column; gap: 10px; }
        .resp-header { 
            font-weight: 700; 
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .resp-body ul { margin: 8px 0; padding-left: 18px; list-style: none; }
        .resp-body li { margin-bottom: 8px; position: relative; }
        .resp-body li::before {
            content: "→";
            position: absolute;
            left: -18px;
            color: var(--accent);
            font-weight: bold;
        }
        .resp-footer { 
            font-size: 0.8rem; 
            border-top: 1px solid rgba(0,0,0,0.05);
            padding-top: 8px;
            color: var(--text-muted);
            font-style: italic;
        }

        .input-bar {
            padding: 20px 24px;
            background: var(--bg-glass);
            display: flex;
            align-items: center;
            gap: 12px;
            border-top: 1px solid var(--glass-border);
            flex-shrink: 0;
        }

        @media (max-width: 600px) { .input-bar { padding-bottom: calc(20px + env(safe-area-inset-bottom)); } }

        input {
            flex: 1;
            background: var(--bot-bubble);
            border: 2px solid transparent;
            color: var(--text-main);
            padding: 14px 20px;
            border-radius: 16px;
            outline: none;
            font-size: 16px;
            transition: 0.3s;
        }

        input:focus { border-color: var(--accent); background: var(--bg-glass); }

        .send-pill {
            background: var(--primary-gradient);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0, 51, 102, 0.3);
        }

        .send-pill:hover { transform: scale(1.05) rotate(5deg); }
        .send-pill:active { transform: scale(0.95); }

        /* Custom Scrollbar */
        #chat::-webkit-scrollbar { width: 5px; }
        #chat::-webkit-scrollbar-track { background: transparent; }
        #chat::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
    </style>
</head>
<body>

<div class="chat-shell">
    <header>
        <div class="logo-area">
            <h1>NaviGo AI</h1>
            <span>Smart Tourism Guide</span>
        </div>
        <button class="theme-btn" onclick="toggleTheme()" aria-label="Toggle Dark Mode">🌙</button>
    </header>
    
    <div id="chat">
        <div class="msg bot-msg">Welcome! I'm NaviGo. Ready to explore the hidden gems of Caloocan, Malabon, Navotas, or Valenzuela? 🏝️</div>
    </div>

    <div class="input-bar">
        <input id="input" type="text" placeholder="Where do you want to go?" onkeypress="handleKeyPress(event)" autocomplete="off">
        <button class="send-pill" onclick="send()" aria-label="Send Message">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
    </div>
</div>

<script>
    let history = [];

    function formatMessage(text) {
        if (text.includes('<div')) return text;
        let footer = "";
        const footerRegex = /(What next\?|Anything else\?|How can I help\?|Another one\?)$/i;
        const footerMatch = text.match(footerRegex);
        
        let remainingText = text;
        if (footerMatch) {
            footer = `<div class="resp-footer">${footerMatch[0]}</div>`;
            remainingText = text.replace(footerMatch[0], "").trim();
        }

        let header = "";
        let bodyText = remainingText;
        const bodyStartMatch = remainingText.match(/(This section is|Welcome to|You might|Here are|•)/i);
        
        if (bodyStartMatch && bodyStartMatch.index > 0) {
            header = remainingText.substring(0, bodyStartMatch.index).trim();
            bodyText = remainingText.substring(bodyStartMatch.index).trim();
        }

        if (bodyText.includes('•')) {
            let items = bodyText.split('•').map(i => i.trim()).filter(i => i);
            bodyText = `<ul>${items.map(i => `<li>${i}</li>`).join('')}</ul>`;
        }

        return `<div class="response-container">
                    ${header ? `<div class="resp-header">${header}</div>` : ""}
                    <div class="resp-body">${bodyText}</div>
                    ${footer}
                </div>`;
    }

    function toggleTheme() {
        const body = document.body;
        const btn = document.querySelector('.theme-btn');
        body.classList.toggle('dark-mode');
        btn.innerHTML = body.classList.contains('dark-mode') ? "☀️" : "🌙";
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter') send();
    }

    async function send() {
        const input = document.getElementById('input');
        const msg = input.value.trim();
        if (!msg) return;

        const chat = document.getElementById('chat');
        chat.innerHTML += `<div class="msg user-msg">${msg}</div>`;
        input.value = '';
        chat.scrollTop = chat.scrollHeight;

        const loadingId = "loading-" + Date.now();
        chat.innerHTML += `<div class="msg bot-msg" id="${loadingId}" style="opacity: 0.6">NaviGo is typing...</div>`;
        chat.scrollTop = chat.scrollHeight;

        try {
            const res = await fetch('https://camanava-bot.onrender.com/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: msg, history: history})
            });
            
            const data = await res.json();
            document.getElementById(loadingId).remove();
            
            const botHTML = formatMessage(data.response);
            chat.innerHTML += `<div class="msg bot-msg">${botHTML}</div>`;
            
            history = data.history;
            chat.scrollTop = chat.scrollHeight;
        } catch (error) {
            if(document.getElementById(loadingId)) document.getElementById(loadingId).remove();
            chat.innerHTML += `<div class="msg bot-msg" style="border: 1px solid #ff4444; color: #ff4444;">System encountered a connection blip. Please try again!</div>`;
            chat.scrollTop = chat.scrollHeight;
        }
    }
</script>

</body>
</html>
