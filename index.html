<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NaviGo AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-scaffold: #f4f7f6;
            --card-bg: #ffffff;
            --header-bg: #000080; 
            --header-text: #ffffff;
            --chat-bg: #ffffff;
            --user-bubble: #000080;
            --user-text: #ffffff;
            --bot-bubble: #e9ecef;
            --bot-text: #333333;
            --border: #eeeeee;
            --input-bg: #ffffff;
            --input-text: #333333;
        }

        body.dark-mode {
            --bg-scaffold: #0D1B2A;
            --card-bg: #162A45;
            --header-bg: #0A1F44;
            --header-text: #5B9BD5;
            --chat-bg: #1A2F4A;
            --user-bubble: #1B3A6B;
            --user-text: #ffffff;
            --bot-bubble: #2A4060;
            --bot-text: #5B9BD5;
            --border: #2A4060;
            --input-bg: #0D1B2A;
            --input-text: #ffffff;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-scaffold);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            transition: all 0.3s ease;
            /* Prevents weird scrolling on some mobile browsers */
            overflow: hidden; 
        }

        .chat-container {
            width: 450px; /* Default desktop width */
            height: 85vh; /* Responsive height */
            max-height: 800px;
            background: var(--card-bg);
            display: flex;
            flex-direction: column;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            overflow: hidden;
            border: 1px solid var(--border);
            transition: width 0.3s, height 0.3s;
        }

        /* --- MOBILE COMPATIBILITY --- */
        @media (max-width: 600px) {
            body {
                align-items: flex-start;
            }
            .chat-container {
                width: 100vw;
                height: 100vh;
                max-height: 100vh;
                border-radius: 0;
                border: none;
            }
            header {
                padding: 12px 15px;
                border-radius: 0;
            }
            .logo { font-size: 1.1rem; }
            .message { max-width: 90%; font-size: 0.85rem; }
            .input-area { padding: 10px; }
        }

        header {
            background-color: var(--header-bg);
            color: var(--header-text);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            z-index: 10;
        }

        .logo { font-size: 1.2rem; }

        .theme-toggle {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid var(--header-text);
            color: var(--header-text);
            padding: 5px 12px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.75rem;
        }

        #chat {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: var(--chat-bg);
            /* Smooth scrolling for iOS */
            -webkit-overflow-scrolling: touch; 
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.9rem;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
            word-wrap: break-word;
        }

        .user-msg {
            align-self: flex-end;
            background-color: var(--user-bubble);
            color: var(--user-text);
            border-bottom-right-radius: 2px;
        }

        .bot-msg {
            align-self: flex-start;
            background-color: var(--bot-bubble);
            color: var(--bot-text);
            border-bottom-left-radius: 2px;
        }

        .input-area {
            display: flex;
            padding: 15px;
            background: var(--card-bg);
            border-top: 1px solid var(--border);
        }

        input {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--input-text);
            padding: 12px 15px;
            border-radius: 25px;
            outline: none;
            font-size: 16px; /* Prevents auto-zoom on iOS */
        }

        button.send-btn {
            background: var(--user-bubble);
            color: var(--user-text);
            border: none;
            padding: 0 20px;
            margin-left: 8px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Structured Response Styling (from your previous versions) */
        .response-container { display: flex; flex-direction: column; gap: 8px; }
        .resp-header { font-weight: 600; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 4px; }
        .resp-body ul { margin: 5px 0; padding-left: 18px; }
        .resp-footer { font-style: italic; font-size: 0.8rem; opacity: 0.7; }
    </style>
</head>
<body>

<div class="chat-container">
    <header>
        <span class="logo">NaviGo Chat</span>
        <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
    </header>
    
    <div id="chat">
        <div class="message bot-msg">Hello! I am NaviGo. How can I help you explore CAMANAVA today?</div>
    </div>

    <div class="input-area">
        <input id="input" type="text" placeholder="Message NaviGo..." onkeypress="handleKeyPress(event)" inputmode="text">
        <button class="send-btn" onclick="send()">Send</button>
    </div>
</div>

<script>
    let history = [];

    function formatMessage(text) {
        if (text.includes('<div')) return text;
        let footer = "";
        const footerRegex = /(What next\?|Anything else\?|How can I help\?|Another one\?)$/i;
        const footerMatch = text.match(footerRegex);
        
        let remainingText = text;
        if (footerMatch) {
            footer = `<div class="resp-footer">${footerMatch[0]}</div>`;
            remainingText = text.replace(footerMatch[0], "").trim();
        }

        let header = "";
        let bodyText = remainingText;
        const bodyStartMatch = remainingText.match(/(This section is|Welcome to|You might|Here are|•)/i);
        
        if (bodyStartMatch && bodyStartMatch.index > 0) {
            header = remainingText.substring(0, bodyStartMatch.index).trim();
            bodyText = remainingText.substring(bodyStartMatch.index).trim();
        }

        if (bodyText.includes('•')) {
            let items = bodyText.split('•').map(i => i.trim()).filter(i => i);
            bodyText = `<ul>${items.map(i => `<li>${i}</li>`).join('')}</ul>`;
        }

        return `<div class="response-container">
                    ${header ? `<div class="resp-header">${header}</div>` : ""}
                    <div class="resp-body">${bodyText}</div>
                    ${footer}
                </div>`;
    }

    function toggleTheme() {
        const body = document.body;
        const btn = document.querySelector('.theme-toggle');
        body.classList.toggle('dark-mode');
        btn.innerHTML = body.classList.contains('dark-mode') ? "☀️" : "🌙";
    }

    function handleKeyPress(e) {
        if (e.key === 'Enter') send();
    }

    async function send() {
        const input = document.getElementById('input');
        const msg = input.value.trim();
        if (!msg) return;

        const chat = document.getElementById('chat');
        chat.innerHTML += `<div class="message user-msg">${msg}</div>`;
        input.value = '';
        chat.scrollTop = chat.scrollHeight;

        const loadingId = "loading-" + Date.now();
        chat.innerHTML += `<div class="message bot-msg" id="${loadingId}">Thinking...</div>`;
        chat.scrollTop = chat.scrollHeight;

        try {
            const res = await fetch('https://camanava-bot.onrender.com/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: msg, history: history})
            });
            
            const data = await res.json();
            document.getElementById(loadingId).remove();
            
            const botHTML = formatMessage(data.response);
            chat.innerHTML += `<div class="message bot-msg">${botHTML}</div>`;
            
            history = data.history;
            chat.scrollTop = chat.scrollHeight;
        } catch (error) {
            if(document.getElementById(loadingId)) document.getElementById(loadingId).remove();
            chat.innerHTML += `<div class="message bot-msg" style="border: 1px solid #FA003F;">[System] Connection error.</div>`;
            chat.scrollTop = chat.scrollHeight;
        }
    }
</script>

</body>
</html>
